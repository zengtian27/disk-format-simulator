<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>磁盘分区格式化模拟系统</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f5f7fb;
            color: #333;
        }

        .container {
            width: 420px;
            margin: 80px auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 32px;
        }

        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        select, button {
            width: 100%;
            height: 42px;
            border-radius: 8px;
            border: 1px solid #d9dfe8;
            font-size: 15px;
        }

        select {
            padding: 0 12px;
            background: #fff;
        }

        button {
            background: #1677ff;
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #0f5fd1;
        }

        .tip {
            margin-top: 16px;
            font-size: 13px;
            color: #666;
            line-height: 1.7;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>磁盘分区格式化模拟系统</h1>

    <form action="/driver/format" method="get">
        <div class="form-group">
            <label for="letter">请选择逻辑驱动器</label>
            <select id="letter" name="letter" required>
                <option value="A:">A:</option>
                <option value="B:">B:</option>
                <option value="C:">C:</option>
                <option value="D:">D:</option>
                <option value="E:">E:</option>
                <option value="F:">F:</option>
                <option value="G:">G:</option>
                <option value="H:">H:</option>
                <option value="I:">I:</option>
                <option value="J:">J:</option>
                <option value="K:">K:</option>
                <option value="L:">L:</option>
                <option value="M:">M:</option>
                <option value="N:">N:</option>
                <option value="O:">O:</option>
                <option value="P:">P:</option>
                <option value="Q:">Q:</option>
                <option value="R:">R:</option>
                <option value="S:">S:</option>
                <option value="T:">T:</option>
                <option value="U:">U:</option>
                <option value="V:">V:</option>
                <option value="W:">W:</option>
                <option value="X:">X:</option>
                <option value="Y:">Y:</option>
                <option value="Z:">Z:</option>
            </select>
        </div>

        <button type="submit">提交查询</button>
    </form>

    <div class="tip">
        说明：系统会先根据逻辑驱动器查询分区，再根据分区查询硬件实现类，最后执行格式化逻辑。
    </div>
</div>
</body>
</html>
